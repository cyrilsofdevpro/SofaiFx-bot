<!-- Login/Register Modal Component for SofAi FX -->
<!-- Include this in index.html body -->

<div id="auth-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-slate-900 border border-slate-700 rounded-lg p-8 max-w-md w-full shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-6">SofAi FX Dashboard</h2>
        
        <!-- Tab Navigation -->
        <div class="flex gap-4 mb-6 border-b border-slate-700">
            <button id="login-tab" class="px-4 py-2 border-b-2 border-green-500 text-white font-semibold cursor-pointer hover:text-green-400 transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
            <button id="register-tab" class="px-4 py-2 text-gray-400 hover:text-white font-semibold cursor-pointer transition">
                <i class="fas fa-user-plus mr-2"></i>Register
            </button>
        </div>
        
        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="login-email" class="w-full px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white focus:border-green-500 focus:outline-none transition" placeholder="your@email.com" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="login-password" class="w-full px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white focus:border-green-500 focus:outline-none transition" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full px-4 py-2 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-lg transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>
        
        <!-- Register Form (Hidden by default) -->
        <form id="register-form" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="register-email" class="w-full px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white focus:border-green-500 focus:outline-none transition" placeholder="your@email.com" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="register-password" class="w-full px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white focus:border-green-500 focus:outline-none transition" placeholder="At least 6 characters" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Confirm Password</label>
                <input type="password" id="register-confirm" class="w-full px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white focus:border-green-500 focus:outline-none transition" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full px-4 py-2 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-lg transition">
                <i class="fas fa-user-plus mr-2"></i>Create Account
            </button>
        </form>
    </div>
</div>
